name: Backend CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Determine Version
      id: vars
      run: |
        if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
          echo "VERSION=latest" >> $GITHUB_ENV
        else
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${SAFE_BRANCH_NAME}-${SHORT_SHA}-SNAPSHOT" >> $GITHUB_ENV
        fi

    - name: Build and Test
      run: ./gradlew backend:build backend:test -Pversion=${{ env.VERSION }}
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: backend
        args: >
          -Dsonar.projectKey=kdiab-profiles
          -Dsonar.organization=triplem
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=src/main/kotlin
          -Dsonar.tests=src/test/kotlin,src/e2e-test/kotlin,src/integration-test/kotlin
          -Dsonar.java.binaries=build/classes/kotlin/main
          -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/kover/report.xml
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: backend/Dockerfile
        push: false
        tags: |
          kdiab-profiles-backend:latest
          kdiab-profiles-backend:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
