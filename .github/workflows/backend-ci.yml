name: Backend CI

on:
  push:
    branches: [ "**" ]
    paths:
      - 'backend/**'
      - 'api/openapi.yaml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'backend/**'
      - 'api/openapi.yaml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Determine Version
      id: vars
      run: |
        if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
          echo "VERSION=latest" >> $GITHUB_ENV
        else
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${SAFE_BRANCH_NAME}-${SHORT_SHA}-SNAPSHOT" >> $GITHUB_ENV
        fi

    - name: Build and Test
      run: ./gradlew backend:check backend:cyclonedxBom -Pversion=${{ env.VERSION }}

    - name: SonarCloud Scan
      if: env.SONAR_TOKEN != ''
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: backend
        args: >
          -Dsonar.projectKey=triplem_kdiab-profiles
          -Dsonar.organization=triplem
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=src/main/kotlin
          -Dsonar.tests=src/test/kotlin,src/e2e-test/kotlin,src/integration-test/kotlin
          -Dsonar.java.binaries=build/classes/kotlin/main
          -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/kover/report.xml

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: backend/Dockerfile
        push: false
        tags: |
          kdiab-profiles-backend:latest
          kdiab-profiles-backend:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/backend-image.tar

    - name: Upload Docker Image
      uses: actions/upload-artifact@v4
      with:
        name: backend-image
        path: /tmp/backend-image.tar
        retention-days: 7

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: backend-bom
        path: backend/build/reports/cyclonedx/bom.json
        retention-days: 7
