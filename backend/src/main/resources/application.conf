ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ org.javafreedom.kdiab.profiles.ApplicationKt.module ]
    }
}

jwt {
    # Local dev defaults — MUST be overridden in production via JWT_DOMAIN and JWKS_URL env vars.
    # JWKS_URL must use HTTPS in production (Security.kt enforces this at startup).
    domain = "http://localhost:8081/realms/kdiab-profiles"
    domain = ${?JWT_DOMAIN}
    jwksUrl = "http://localhost:8081/realms/kdiab-profiles/protocol/openid-connect/certs"
    jwksUrl = ${?JWKS_URL}
    audience = "profile"
    audience = ${?JWT_AUDIENCE}
    realm = "kdiab-profiles"
    realm = ${?JWT_REALM}
    # No default — must be supplied via JWT_SECRET when jwt.test = true.
    # In production (jwt.test unset/false) this value is unused; JWK is used instead.
    secret = ${?JWT_SECRET}
}

storage {
    driverClassName = "org.postgresql.Driver"
    jdbcUrl = "jdbc:postgresql://localhost:5432/kdiab-profiles"
    jdbcUrl = ${?JDBC_URL}
    username = "postgres"
    username = ${?DB_USER}
    # No default — must be supplied via DB_PASSWORD.
    password = ${?DB_PASSWORD}
    maximumPoolSize = 10
    maximumPoolSize = ${?DB_POOL_SIZE}
    isAutoCommit = false
    transactionIsolation = "TRANSACTION_REPEATABLE_READ"
}
