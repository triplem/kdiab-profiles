ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ org.javafreedom.kdiab.profiles.ApplicationKt.module ]
    }
}

jwt {
    domain = "http://localhost:8081/realms/kdiab-profiles"
    domain = ${?JWT_DOMAIN}
    jwksUrl = "http://localhost:8081/realms/kdiab-profiles/protocol/openid-connect/certs"
    jwksUrl = ${?JWKS_URL}
    audience = "profile"
    audience = ${?JWT_AUDIENCE}
    realm = "kdiab-profiles"
    realm = ${?JWT_REALM}
    secret = "secret"
    secret = ${?JWT_SECRET}
}

storage {
    driverClassName = "org.postgresql.Driver"
    jdbcUrl = "jdbc:postgresql://localhost:5432/kdiab-profiles"
    jdbcUrl = ${?JDBC_URL}
    username = "postgres"
    username = ${?DB_USER}
    password = "password"
    password = ${?DB_PASSWORD}
    maximumPoolSize = 3
    maximumPoolSize = ${?DB_POOL_SIZE}
    isAutoCommit = false
    transactionIsolation = "TRANSACTION_REPEATABLE_READ"
}
