services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-kdiab-profiles}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kdiab-profiles}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8081:8080"

  backend:
   # image: localhost/kdiab-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kdiab-profiles
      JDBC_URL: jdbc:postgresql://postgres:5432/kdiab-profiles
      JWT_DOMAIN: http://localhost:8081/realms/kdiab-profiles
      JWKS_URL: http://keycloak:8080/realms/kdiab-profiles/protocol/openid-connect/certs
      JWT_AUDIENCE: profile
      JWT_REALM: kdiab-profiles
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
